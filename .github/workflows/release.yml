name: 'Publish Release'

on:
  push:
    tags:
      - 'v*' # زمانی که تگی مثل v1.0.0 پاش شود، این ورک‌فلو اجرا می‌شود

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # برای خروجی مک (.dmg, .app)
            args: ''
          - platform: 'ubuntu-22.04' # برای خروجی لینوکس (.deb, .appimage)
            args: ''
          - platform: 'windows-latest' # برای خروجی ویندوز (.msi, .exe)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # نصب Node.js و پکیج منیجر (در اینجا pnpm فرض شده، اگر npm یا yarn دارید تغییر دهید)
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # نصب Rust (چون توری با راست نوشته شده)
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # ابزار لینوکس برای Tauri v2 (اگر از v1 استفاده میکنید باز هم سازگار است)
          targets: ${{ matrix.platform == 'ubuntu-22.04' && 'x86_64-unknown-linux-gnu' || '' }}

      # پیش‌نیازهای ضروری برای سیستم‌عامل لینوکس
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # نصب وابستگی‌های فرانت‌اند (Vite)
      # اگر از npm استفاده می‌کنید: npm ci و برای yarn: yarn install
      - name: install frontend dependencies
        run: npm install 

      # ساخت و انتشار خودکار در گیت‌هاب
      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'App ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true # ابتدا به صورت Draft ذخیره می‌شود تا خودتان تایید و Publish کنید
          prerelease: false
          includeNpmScript: false
          args: ${{ matrix.args }}