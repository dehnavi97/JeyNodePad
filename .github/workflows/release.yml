name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            rust_target: 'x86_64-pc-windows-msvc'
            friendly_name: 'JeyNodePad-Windows-x64'

          - platform: 'windows-latest'
            args: '--target i686-pc-windows-msvc'
            rust_target: 'i686-pc-windows-msvc'
            friendly_name: 'JeyNodePad-Windows-x86-32bit'

          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
            friendly_name: 'JeyNodePad-Mac-Silicon-M1-M2-M3'

          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
            friendly_name: 'JeyNodePad-Mac-Intel'

          - platform: 'ubuntu-22.04'
            args: '--target x86_64-unknown-linux-gnu'
            rust_target: 'x86_64-unknown-linux-gnu'
            friendly_name: 'JeyNodePad-Linux-x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ۱. تنظیم محیط Node.js
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ۲. نصب راست همراه با تارگت دقیق مشخص شده در ماتریس بالا
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # ۳. نصب پیش‌نیازهای لینوکس
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # ۴. نصب پکیج‌ها با pnpm
      - name: install frontend dependencies
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm install

      # ۵. تغییر نام اختصاصی برنامه
      - name: Update App Name for Platform
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            config.productName = '${{ matrix.friendly_name }}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2));
          "

      # ۶. بیلد نهایی و انتشار
      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'App ${{ github.ref_name }}'
          releaseBody: 'تغییرات این نسخه را در فایل‌های زیر دانلود کنید.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}